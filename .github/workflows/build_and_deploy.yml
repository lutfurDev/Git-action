name: Build and Deploy APK to Teams

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master
    types: [closed]

jobs:
  build:
    # Only run if PR is merged or direct push to master
    if: github.event_name == 'push' || (github.event_name == 'pull_request' && github.event.pull_request.merged == true)
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
      
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
      

      - name: Get dependencies
        run: flutter pub get
      
      - name: Run tests
        run: flutter test || echo "Tests failed but continuing build"
        continue-on-error: true
      
      - name: Build APK
        run: flutter build apk --release
      
      - name: Get APK file name
        id: apk_info
        run: |
          APK_PATH=$(find build/app/outputs/flutter-apk -name "*.apk" | head -n 1)
          APK_NAME=$(basename $APK_PATH)
          echo "apk_path=$APK_PATH" >> $GITHUB_OUTPUT
          echo "apk_name=$APK_NAME" >> $GITHUB_OUTPUT
          echo "apk_size=$(du -h $APK_PATH | cut -f1)" >> $GITHUB_OUTPUT
      
      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-release
          path: ${{ steps.apk_info.outputs.apk_path }}
      
      - name: Upload APK to Google Drive
        env:
          GDRIVE_CREDENTIALS: ${{ secrets.GDRIVE_CREDENTIALS_DATA }}
          FOLDER_ID: "1hhGyEjYhj5-P0gEP26YsVBCvr1nEsavu"
          APK_PATH: ${{ steps.apk_info.outputs.apk_path }}
        run: |
          if [ -z "$GDRIVE_CREDENTIALS" ]; then
            echo "⚠️  GDRIVE_CREDENTIALS_DATA secret is not set. Skipping Google Drive upload."
            echo "Please follow the setup guide in .github/workflows/GOOGLE_DRIVE_SETUP.md"
            exit 0
          fi
          
          # Install required packages
          pip install --upgrade google-auth google-auth-oauthlib google-auth-httplib2 google-api-python-client
          
          # Create credentials file
          echo "$GDRIVE_CREDENTIALS" > /tmp/credentials.json
          
          # Create Python upload script
          cat > /tmp/upload.py << 'PYTHON_SCRIPT'
          import os
          import sys
          from google.oauth2 import service_account
          from googleapiclient.discovery import build
          from googleapiclient.http import MediaFileUpload
          
          def upload_file():
              try:
                  # Setup credentials
                  SCOPES = ['https://www.googleapis.com/auth/drive.file']
                  SERVICE_ACCOUNT_FILE = '/tmp/credentials.json'
                  
                  credentials = service_account.Credentials.from_service_account_file(
                      SERVICE_ACCOUNT_FILE, scopes=SCOPES)
                  
                  # Build the Drive service
                  service = build('drive', 'v3', credentials=credentials)
                  
                  # Get file details
                  apk_path = os.environ.get('APK_PATH')
                  folder_id = os.environ.get('FOLDER_ID')
                  file_name = f"app-release-{os.environ.get('GITHUB_SHA', 'unknown')[:7]}.apk"
                  
                  # Upload file
                  file_metadata = {
                      'name': file_name,
                      'parents': [folder_id]
                  }
                  
                  media = MediaFileUpload(apk_path, mimetype='application/vnd.android.package-archive')
                  
                  file = service.files().create(
                      body=file_metadata,
                      media_body=media,
                      fields='id, name, webViewLink'
                  ).execute()
                  
                  print(f"✅ File uploaded successfully!")
                  print(f"📦 File Name: {file.get('name')}")
                  print(f"🔗 File ID: {file.get('id')}")
                  print(f"🌐 View Link: {file.get('webViewLink')}")
                  
                  return 0
              except Exception as e:
                  print(f"❌ Error uploading file: {str(e)}")
                  return 1
          
          if __name__ == '__main__':
              sys.exit(upload_file())
          PYTHON_SCRIPT
          
          # Run the upload script
          python3 /tmp/upload.py
          
          # Cleanup
          rm -f /tmp/credentials.json /tmp/upload.py
      
      - name: Send APK to Microsoft Teams
        env:
          TEAMS_WEBHOOK_URL: ${{ secrets.TEAMS_WEBHOOK_URL }}
        run: |
          if [ -z "$TEAMS_WEBHOOK_URL" ]; then
            echo "⚠️  TEAMS_WEBHOOK_URL secret is not set. Skipping Teams notification."
            exit 0
          fi
          
          # Get commit info
          COMMIT_MSG=$(git log -1 --pretty=%B)
          COMMIT_AUTHOR=$(git log -1 --pretty=%an)
          COMMIT_SHA=$(git log -1 --pretty=%h)
          
          # Create message payload
          MESSAGE=$(cat <<EOF
          {
            "@type": "MessageCard",
            "@context": "https://schema.org/extensions",
            "summary": "APK Build Completed",
            "themeColor": "0078D7",
            "title": "✅ APK Build Successful",
            "sections": [
              {
                "activityTitle": "Build Information",
                "facts": [
                  {
                    "name": "Repository:",
                    "value": "${{ github.repository }}"
                  },
                  {
                    "name": "Branch:",
                    "value": "${{ github.ref_name }}"
                  },
                  {
                    "name": "Commit:",
                    "value": "$COMMIT_SHA"
                  },
                  {
                    "name": "Author:",
                    "value": "$COMMIT_AUTHOR"
                  },
                  {
                    "name": "APK Size:",
                    "value": "${{ steps.apk_info.outputs.apk_size }}"
                  },
                  {
                    "name": "APK Name:",
                    "value": "${{ steps.apk_info.outputs.apk_name }}"
                  },
                  {
                    "name": "Status:",
                    "value": "✅ Uploaded to Google Drive"
                  }
                ],
                "text": "$COMMIT_MSG"
              }
            ],
            "potentialAction": [
              {
                "@type": "OpenUri",
                "name": "View Build",
                "targets": [
                  {
                    "os": "default",
                    "uri": "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
                  }
                ]
              },
              {
                "@type": "OpenUri",
                "name": "Download APK",
                "targets": [
                  {
                    "os": "default",
                    "uri": "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
                  }
                ]
              }
            ]
          }
          EOF
          )
          
          # Send to Teams
          curl -H "Content-Type: application/json" -d "$MESSAGE" "$TEAMS_WEBHOOK_URL"
          echo "✅ Notification sent to Microsoft Teams"
      
      - name: Build summary
        run: |
          echo "### 🎉 Build Completed Successfully!" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**APK Details:**" >> $GITHUB_STEP_SUMMARY
          echo "- Name: ${{ steps.apk_info.outputs.apk_name }}" >> $GITHUB_STEP_SUMMARY
          echo "- Size: ${{ steps.apk_info.outputs.apk_size }}" >> $GITHUB_STEP_SUMMARY
          echo "- Path: \`${{ steps.apk_info.outputs.apk_path }}\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Download the APK from the artifacts section above." >> $GITHUB_STEP_SUMMARY
